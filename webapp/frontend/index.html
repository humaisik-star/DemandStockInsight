<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demand &amp; Stock Assistant</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: #17212b;
      --panel-2: #1e2b38;
      --accent: #2b8cbe;
      --accent-2: #34c0eb;
      --text: #e6edf3;
      --muted: #8aa0b3;
      --user: #2b8cbe;
      --bot: #1e2b38;
      --border: #26333f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 16px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    header .dot { width: 10px; height: 10px; border-radius: 50%; background: #35d07f; box-shadow: 0 0 8px #35d07f; }
    header h1 { font-size: 17px; margin: 0; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; margin-left: auto; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; max-width: 820px; width: 100%; margin: 0 auto; }
    .msg { display: flex; margin-bottom: 16px; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap;
      font-size: 14.5px;
    }
    .msg.user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: var(--bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .tools { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tool-badge {
      font-size: 11px; color: var(--accent-2); background: rgba(52,192,235,0.1);
      border: 1px solid rgba(52,192,235,0.3); border-radius: 20px; padding: 2px 9px;
    }
    .chips { max-width: 820px; margin: 0 auto 8px; padding: 0 24px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      font-size: 12.5px; color: var(--muted); background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .chip:hover { color: var(--text); border-color: var(--accent); }
    footer { padding: 14px 24px 20px; max-width: 820px; width: 100%; margin: 0 auto; }
    .inputrow { display: flex; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 8px 8px 8px 16px; }
    #input {
      flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; resize: none;
      max-height: 120px; line-height: 1.4; padding: 6px 0;
    }
    #send {
      background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 18px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    #send:hover { background: var(--accent-2); }
    #send:disabled { opacity: .5; cursor: default; }
    .typing { color: var(--muted); font-size: 13px; font-style: italic; }
    .config-note { color: var(--muted); font-size: 11px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>Demand &amp; Stock Assistant</h1>
    <span class="sub">Azure OpenAI · gpt-5-mini</span>
  </header>

  <div id="chat"></div>

  <div class="chips" id="chips">
    <div class="chip">Stok özetini ver</div>
    <div class="chip">En riskli 3 ürün hangisi?</div>
    <div class="chip">S001 P0001 için stok önerisi</div>
    <div class="chip">S003 P0012 talep tahmini</div>
  </div>

  <footer>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Talep ve stok hakkında bir şey sor..."></textarea>
      <button id="send">Gönder</button>
    </div>
    <div class="config-note" id="note"></div>
  </footer>

  <script>
    // ---- Backend URL ----
    // Set at deploy time. Override for testing with ?api=https://your-backend
    const DEFAULT_API = "__BACKEND_URL__";
    const params = new URLSearchParams(location.search);
    const API_BASE = (params.get("api") || localStorage.getItem("api") || DEFAULT_API).replace(/\/$/, "");
    if (params.get("api")) localStorage.setItem("api", params.get("api"));

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const note = document.getElementById("note");
    let history = [];

    if (API_BASE.includes("__BACKEND")) {
      note.textContent = "⚠ Backend URL ayarlanmadı. ?api=https://<backend> ile deneyebilirsin.";
    }

    function addMsg(role, text, tools) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + (role === "user" ? "user" : "bot");
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      if (tools && tools.length) {
        const t = document.createElement("div");
        t.className = "tools";
        [...new Set(tools)].forEach(name => {
          const b = document.createElement("span");
          b.className = "tool-badge";
          b.textContent = "🔧 " + name;
          t.appendChild(b);
        });
        bubble.appendChild(t);
      }
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    async function ask(message) {
      addMsg("user", message);
      history.push({ role: "user", content: message });
      const typing = addMsg("bot", "yazıyor…");
      typing.classList.add("typing");
      send.disabled = true;

      try {
        const res = await fetch(API_BASE + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history: history.slice(0, -1) }),
        });
        const data = await res.json();
        typing.classList.remove("typing");
        typing.textContent = data.answer || "(boş yanıt)";
        if (data.tools_used && data.tools_used.length) {
          const t = document.createElement("div");
          t.className = "tools";
          [...new Set(data.tools_used)].forEach(name => {
            const b = document.createElement("span");
            b.className = "tool-badge";
            b.textContent = "🔧 " + name;
            t.appendChild(b);
          });
          typing.appendChild(t);
        }
        history.push({ role: "assistant", content: data.answer || "" });
      } catch (e) {
        typing.classList.remove("typing");
        typing.textContent = "Hata: " + e.message + " (backend URL doğru mu?)";
      } finally {
        send.disabled = false;
        chat.scrollTop = chat.scrollHeight;
      }
    }

    function submit() {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = "";
      input.style.height = "auto";
      ask(msg);
    }

    send.onclick = submit;
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
    document.getElementById("chips").addEventListener("click", e => {
      if (e.target.classList.contains("chip")) { input.value = e.target.textContent; submit(); }
    });

    addMsg("bot", "Merhaba! 👋 Talep tahminleri ve stok önerileri hakkında soru sorabilirsin. Aşağıdaki örneklerden birine tıkla ya da kendi sorunu yaz.");
  </script>
</body>
</html>
